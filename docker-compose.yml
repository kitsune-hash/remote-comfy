version: '3.8'

services:
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/remote-comfy.db
      - RUNQY_URL=${RUNQY_URL:-http://host.docker.internal:3000}
      - RUNQY_API_KEY=${RUNQY_API_KEY:-}
      - RUNQY_QUEUE=${RUNQY_QUEUE:-comfy}
      - GATEWAY_URL=${GATEWAY_URL:-http://localhost:8080}
    volumes:
      - gateway-data:/data

  # Worker runs separately on GPU machines (Vast.ai)
  # Included here for local testing only
  # worker:
  #   build: ./worker
  #   environment:
  #     - RUNQY_URL=http://gateway:3000
